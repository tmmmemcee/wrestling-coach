<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coaches - Wrestling Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,.7) !important; }
    .nav-link.active { color: var(--primary) !important; font-weight: bold; }
    .hero { background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%); padding: 2.5rem 0; text-align: center; }
    .hero h1 { color: var(--primary); font-size: 2.2rem; font-weight: bold; }
    .coach-card { background: var(--card); border: none; transition: transform .2s; }
    .coach-card:hover { transform: translateY(-4px); }
    .coach-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; margin: 0 auto 1rem; }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; border-color: #c73652; color: white; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/matches.html">Matches</a>
      <a class="nav-link active" href="/coaches.html">Coaches</a>
      <a class="nav-link" href="/admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>🏆 Coaching Legends</h1>
    <p class="lead mb-4" style="color:#aaa;">Browse technique videos by legendary coaches</p>
    <p class="text-muted">Search any coach: Ben Askren, Jordan Burroughs, John Smith, Cary Kolat, etc.</p>
  </div>
</div>

<div class="container py-4">
  <h3 class="mb-4" style="color: var(--primary);">Top Coaches by Video Count</h3>
  
  <div id="coachList" class="row g-4">
    <div class="col-12 text-center py-5">
      <div class="spinner-border" style="color: var(--primary);" role="status"></div>
    </div>
  </div>
</div>

<div class="container py-4 mt-5">
  <h3 class="mb-4" style="color: var(--primary);">All Coaches</h3>
  <div id="allCoaches" class="row g-4">
    <div class="col-12 text-center py-5">
      <div class="spinner-border" style="color: var(--primary);"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadCoaches() {
  try {
    const res = await fetch('/api/coaches');
    const coaches = await res.json();
    
    // Top coaches
    const topDiv = document.getElementById('coachList');
    topDiv.innerHTML = coaches.slice(0, 10).map(c => `
      <div class="col-6 col-md-3 col-lg-2">
        <div class="coach-card p-3 text-center">
          <div class="coach-avatar">${c.name[0]}</div>
          <h6 class="mb-1">${c.name}</h6>
          <small class="text-muted">${c.count} videos</small>
        </div>
      </div>
    `).join('');
    
    // All coaches
    const allDiv = document.getElementById('allCoaches');
    allDiv.innerHTML = coaches.map(c => `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card">
          <div class="card-body">
            <h6 class="mb-1" style="color: var(--primary);">${c.name}</h6>
            <p class="text-muted mb-0">${c.count} instructional videos</p>
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Error loading coaches:', e);
    alert('Failed to load coaches');
  }
}

loadCoaches();
</script>
</body>
</html>
