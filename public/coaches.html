<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coaches - Wrestling Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,.7) !important; }
    .nav-link.active { color: var(--primary) !important; font-weight: bold; }
    .hero { background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%); padding: 2.5rem 0; text-align: center; }
    .hero h1 { color: var(--primary); font-size: 2.2rem; font-weight: bold; }
    .coach-card { background: var(--card); border: none; transition: transform .2s, box-shadow .2s; cursor: pointer; }
    .coach-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(233,69,96,.3); }
    .coach-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; margin: 0 auto 1rem; }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; border-color: #c73652; color: white; }
    .filter-select { background: var(--darker); color: white; border: 1px solid #555; }
    .filter-select:focus { background: var(--darker); color: white; border-color: var(--primary); }
    label { color: #aaa; font-size: .85rem; }
    .video-thumb { width: 100%; height: 170px; object-fit: cover; }
    .card-title { color: var(--primary); font-size: 0.95rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/matches.html">Matches</a>
      <a class="nav-link" href="/lesson-plans.html">Lesson Plans</a>
      <a class="nav-link active" href="/coaches.html">Coaches</a>
      <a class="nav-link" href="/admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>🏆 Coaching Legends</h1>
    <p class="lead mb-4" style="color:#aaa;">Browse technique videos by legendary coaches</p>
  </div>
</div>

<div class="container py-4">
  <h3 class="mb-4" style="color: var(--primary);">All Coaches</h3>
  <p class="text-muted mb-4">Click a coach to see their technique videos</p>
  
  <div id="coachList" class="row g-4">
    <div class="col-12 text-center py-5">
      <div class="spinner-border" style="color: var(--primary);" role="status"></div>
    </div>
  </div>
</div>

<!-- Coach Videos Modal -->
<div class="modal fade" id="coachModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white" id="coachModalTitle">Coach Videos</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="coachVideos" class="row g-3"></div>
      </div>
    </div>
  </div>
</div>

<!-- Video Player Modal -->
<div class="modal fade" id="videoModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="ratio ratio-16x9">
          <iframe id="modalFrame" src="" allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
          </iframe>
        </div>
      </div>
      <div class="modal-footer" style="border-color:#333;">
        <span id="modalMeta" class="text-muted small"></span>
        <a id="modalLink" href="#" target="_blank" class="btn btn-sm btn-wrestling ms-auto">Watch on YouTube</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const coachModal = new bootstrap.Modal(document.getElementById('coachModal'));
const videoModal = new bootstrap.Modal(document.getElementById('videoModal'));
let currentCoach = null;

async function loadCoaches() {
  try {
    const res = await fetch('/api/coaches');
    const coaches = await res.json();
    
    const div = document.getElementById('coachList');
    
    if (!coaches.length) {
      div.innerHTML = `
        <div class="col-12 text-center py-5">
          <p class="text-muted">No coaches found yet. Videos need coach names to appear here.</p>
          <a href="/admin.html" class="btn btn-outline-light mt-2">Add Coach Videos</a>
        </div>`;
      return;
    }
    
    div.innerHTML = coaches.map(c => `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="coach-card card p-3 text-center h-100" onclick="showCoachVideos('${c.name.replace(/'/g,"\\'")}')">
          <div class="coach-avatar">${c.name[0]}</div>
          <h6 class="mb-1">${c.name}</h6>
          <small class="text-muted">${c.count} videos</small>
          <button class="btn btn-sm btn-wrestling mt-2">View Videos →</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Error loading coaches:', e);
    document.getElementById('coachList').innerHTML = 
      `<div class="col-12 text-center py-5"><div class="alert alert-danger">Failed to load coaches</div></div>`;
  }
}

async function showCoachVideos(coachName) {
  currentCoach = coachName;
  document.getElementById('coachModalTitle').textContent = `${coachName} Videos`;
  document.getElementById('coachVideos').innerHTML = `
    <div class="col-12 text-center py-5">
      <div class="spinner-border" style="color:#e94560;"></div>
    </div>`;
  
  coachModal.show();
  
  try {
    const res = await fetch('/api/search?coach=' + encodeURIComponent(coachName));
    const videos = await res.json();
    
    const div = document.getElementById('coachVideos');
    
    if (!videos.length) {
      div.innerHTML = `<div class="col-12 text-center py-4 text-muted">No videos found for ${coachName}</div>`;
      return;
    }
    
    div.innerHTML = videos.map(v => `
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100">
          <img src="${v.thumbnail_url}" class="video-thumb" style="cursor:pointer;"
            onclick="playVideo('${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.duration_formatted || ''}')">
          <div class="card-body d-flex flex-column">
            <h6 class="card-title">${v.title}</h6>
            <p class="text-muted small mb-2">${v.duration_formatted || ''}</p>
            ${v.move_type ? `<span class="badge badge-red">${v.move_type}</span>` : ''}
            <button class="btn btn-sm btn-wrestling mt-auto" onclick="playVideo('${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.duration_formatted || ''}')">
              ▶ Watch
            </button>
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Error loading coach videos:', e);
    document.getElementById('coachVideos').innerHTML = 
      `<div class="col-12 text-center py-4 text-danger">Failed to load videos</div>`;
  }
}

function playVideo(youtubeId, title, duration) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalFrame').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
  document.getElementById('modalMeta').textContent = duration || '';
  document.getElementById('modalLink').href = `https://www.youtube.com/watch?v=${youtubeId}`;
  
  coachModal.hide();
  videoModal.show();
}

document.getElementById('videoModal').addEventListener('hide.bs.modal', () => {
  document.getElementById('modalFrame').src = '';
});

// Load on page load
loadCoaches();
</script>
</body>
</html>
