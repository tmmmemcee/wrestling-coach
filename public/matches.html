<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches - Wrestling Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,.7) !important; }
    .nav-link.active { color: var(--primary) !important; font-weight: bold; }
    .hero { background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%); padding: 2.5rem 0; text-align: center; }
    .hero h1 { color: var(--primary); font-size: 2.2rem; font-weight: bold; }
    .search-box { background: var(--darker); border: 2px solid var(--primary); color: white; }
    .search-box:focus { background: var(--darker); color: white; box-shadow: 0 0 0 0.2rem rgba(233,69,96,.25); border-color: var(--primary); }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; border-color: #c73652; color: white; }
    .filter-select { background: var(--darker); color: white; border: 1px solid #555; }
    .filter-select:focus { background: var(--darker); color: white; border-color: var(--primary); }
    .card { background: var(--card); border: none; transition: transform .2s; }
    .card:hover { transform: translateY(-4px); }
    .card-title { color: var(--primary); font-size: 0.95rem; }
    .video-thumb { width: 100%; height: 170px; object-fit: cover; }
    .badge-red { background: var(--primary); color: white; }
    .tag-btn { font-size: .78rem; cursor: pointer; border: 1px solid #555; background: transparent; color: #ccc; }
    .tag-btn:hover { border-color: var(--primary); color: var(--primary); }
    label { color: #aaa; font-size: .85rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link active" href="/matches.html">Matches</a>
      <a class="nav-link" href="/lesson-plans.html">Lesson Plans</a>
      <a class="nav-link" href="/coaches.html">Coaches</a>
      <a class="nav-link" href="/admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>🥊 Wrestling Match Footage</h1>
    <p class="lead mb-4" style="color:#aaa;">Study full matches and competition footage</p>
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="input-group input-group-lg mb-3">
          <input type="text" class="form-control search-box" id="searchInput" placeholder="Search matches...">
          <button class="btn btn-wrestling" onclick="searchMatches()">🔍 Search</button>
        </div>
      </div>
    </div>
    
    <!-- Quick match types -->
    <div class="d-flex flex-wrap justify-content-center gap-2 mt-2">
      <button class="btn tag-btn btn-sm" onclick="quickSearch('championship')">Championship</button>
      <button class="btn tag-btn btn-sm" onclick="quickSearch('finals')">Finals</button>
      <button class="btn tag-btn btn-sm" onclick="quickSearch('NCAA')">NCAA</button>
      <button class="btn tag-btn btn-sm" onclick="quickSearch('Olympic')">Olympic</button>
      <button class="btn tag-btn btn-sm" onclick="quickSearch('World Championship')">Worlds</button>
    </div>
  </div>
</div>

<div class="container py-4">
  <!-- Results -->
  <div id="results">
    <div class="text-center py-5">
      <div class="spinner-border" style="color:#e94560;"></div>
      <p class="mt-2 text-muted">Loading matches...</p>
    </div>
  </div>
</div>

<!-- Video Modal -->
<div class="modal fade" id="videoModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="ratio ratio-16x9">
          <iframe id="modalFrame" src="" allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
          </iframe>
        </div>
      </div>
      <div class="modal-footer" style="border-color:#333;">
        <span id="modalMeta" class="text-muted small"></span>
        <a id="modalLink" href="#" target="_blank" class="btn btn-sm btn-wrestling ms-auto">Watch on YouTube</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modal = new bootstrap.Modal(document.getElementById('videoModal'));

document.getElementById('searchInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') searchMatches();
});

function quickSearch(term) {
  document.getElementById('searchInput').value = term;
  searchMatches();
}

function searchMatches() {
  const q = document.getElementById('searchInput').value;
  
  document.getElementById('results').innerHTML = `
    <div class="text-center py-5">
      <div class="spinner-border" style="color:#e94560;"></div>
      <p class="mt-2 text-muted">Searching matches...</p>
    </div>`;
  
  // Search for matches - using 'match' as content_type
  let url = '/api/search?content_type=match';
  if (q) url += '&q=' + encodeURIComponent(q);
  
  fetch(url)
    .then(r => r.json())
    .then(videos => {
      if (!videos.length) {
        // If no matches found, try searching by title/description containing "match"
        fetch('/api/search?q=match')
          .then(r => r.json())
          .then(allMatchVideos => {
            if (allMatchVideos.length) {
              render(allMatchVideos);
            } else {
              document.getElementById('results').innerHTML = `
                <div class="text-center py-5">
                  <p class="text-muted mb-3">No match footage found in the library yet.</p>
                  <p class="text-muted small">Match videos need to be added via Admin or crawler.</p>
                  <a href="/admin.html" class="btn btn-outline-light mt-2">Add Match Videos</a>
                </div>`;
            }
          });
      } else {
        render(videos);
      }
    })
    .catch(() => {
      document.getElementById('results').innerHTML =
        `<div class="alert alert-danger">Failed to load matches.</div>`;
    });
}

function render(videos) {
  const div = document.getElementById('results');
  if (!videos.length) {
    div.innerHTML = `<div class="text-center py-5 text-muted">No match footage found.</div>`;
    return;
  }
  
  div.innerHTML = `
    <p class="text-muted mb-3">${videos.length} match${videos.length !== 1 ? 'es' : ''}</p>
    <div class="row g-3">
      ${videos.map(v => `
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card h-100">
            <img src="${v.thumbnail_url}" class="video-thumb" style="cursor:pointer;"
              onclick="showMatch(${v.id}, '${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.duration_formatted || ''}')">
            <div class="card-body d-flex flex-column">
              <h6 class="card-title">${v.title}</h6>
              <p class="text-muted small mb-2">${v.duration_formatted || ''} • Match Footage</p>
              ${v.coach_name ? `<small class="text-muted">By: ${v.coach_name}</small>` : ''}
              <button class="btn btn-sm btn-wrestling mt-auto" onclick="showMatch(${v.id}, '${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.duration_formatted || ''}')">
                ▶ Watch Match
              </button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function showMatch(id, youtubeId, title, duration) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalFrame').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
  document.getElementById('modalMeta').textContent = duration || 'Match footage';
  document.getElementById('modalLink').href = `https://www.youtube.com/watch?v=${youtubeId}`;
  modal.show();
}

document.getElementById('videoModal').addEventListener('hide.bs.modal', () => {
  document.getElementById('modalFrame').src = '';
});

// Load matches on page load
searchMatches();
</script>
</body>
</html>
