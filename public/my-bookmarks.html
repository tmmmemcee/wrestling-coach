<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookmarks - Wrestling Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,.7) !important; }
    .nav-link:hover, .nav-link.active { color: var(--primary) !important; }
    .hero { background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%); padding: 3rem 0; text-align: center; }
    .hero h1 { color: var(--primary); font-size: 2.5rem; font-weight: bold; }
    .card { background: var(--card); border: none; }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; color: white; }
    .empty-state { text-align: center; padding: 4rem; color: #666; }
    .empty-state i { font-size: 4rem; color: var(--primary); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/matches.html">Matches</a>
      <a class="nav-link" href="/lesson-plans.html">Lesson Plans</a>
      <a class="nav-link" href="/coaches.html">Coaches</a>
      <a class="nav-link" href="/documentaries.html">Documentaries</a>
      <a class="nav-link" href="/my-likes.html">My Likes</a>
      <a class="nav-link active" href="/my-bookmarks.html">My Bookmarks</a>
      <a class="nav-link" href="#" onclick="signOut()">Sign Out</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>💾 Saved Videos</h1>
    <p class="lead" style="color: #aaa;">Videos you've bookmarked for later</p>
    <div class="mt-3">
      <button class="btn btn-outline-light" onclick="window.location.href = '/?'">
        <i class="bi bi-search"></i> Browse All Videos
      </button>
    </div>
  </div>
</div>

<div class="container py-4">
  <div id="bookmarksList">
    <div class="empty-state">
      <i class="bi bi-bookmark"></i>
      <h4 class="mt-3">Loading your bookmarks...</h4>
      <p class="text-muted">Signing you in...</p>
    </div>
  </div>
</div>

<script>
async function checkAuth() {
  const res = await fetch('/api/nostr/authenticated', {
    headers: { 'x-npub': localStorage.getItem('wrestlingCoachNpub') || '' }
  });
  const data = await res.json();
  
  if (!data.authenticated) {
    window.location.href = '/';
    return null;
  }
  
  return data.user;
}

async function loadBookmarks() {
  const user = await checkAuth();
  if (!user) return;
  
  const res = await fetch('/api/user/bookmarks', {
    headers: { 'x-npub': user.npub }
  });
  const data = await res.json();
  
  const container = document.getElementById('bookmarksList');
  
  if (!data.bookmarks.length) {
    container.innerHTML = `
      <div class="card p-5 empty-state">
        <i class="bi bi-bookmark"></i>
        <h4 class="mt-3">No bookmarks yet</h4>
        <p class="text-muted">Go browse videos and click the bookmark icon to save them!</p>
        <button class="btn btn-wrestling mt-3" onclick="window.location.href = '/?'">
          <i class="bi bi-search"></i> Browse Videos
        </button>
      </div>
    `;
    return;
  }
  
  container.innerHTML = `
    <div class="row g-4">
      ${data.bookmarks.map(v => `
        <div class="col-md-6 col-lg-4 col-xl-3">
          <div class="card">
            <img src="${v.thumbnail_url}" style="width: 100%; height: 180px; object-fit: cover;" onerror="this.style.display='none'">
            <div class="p-3">
              <h6 class="mb-1">${v.title}</h6>
              <small class="text-muted">${v.channel || ''} • ${v.duration_formatted || ''}</small><br>
              <small class="text-muted">${new Date(v.bookmarked_at).toLocaleDateString()}</small>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

async function signOut() {
  localStorage.removeItem('wrestlingCoachNpub');
  window.location.reload();
}

loadBookmarks();
</script>
</body>
</html>
