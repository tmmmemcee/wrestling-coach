<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrestling Coach Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .hero { background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%); padding: 2.5rem 0; text-align: center; }
    .hero h1 { color: var(--primary); font-size: 2.2rem; font-weight: bold; }
    .search-box { background: var(--darker); border: 2px solid var(--primary); color: white; }
    .search-box:focus { background: var(--darker); color: white; box-shadow: 0 0 0 0.2rem rgba(233,69,96,.25); border-color: var(--primary); }
    .search-box::placeholder { color: #aaa; }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; border-color: #c73652; color: white; }
    .filter-select { background: var(--darker); color: white; border: 1px solid #555; }
    .filter-select:focus { background: var(--darker); color: white; border-color: var(--primary); }
    .card { background: var(--card); border: none; transition: transform .2s; }
    .card:hover { transform: translateY(-4px); }
    .card-title { color: var(--primary); font-size: 0.95rem; }
    .video-thumb { width: 100%; height: 170px; object-fit: cover; }
    .badge-red { background: var(--primary); color: white; }
    .badge-votes { background: #28a745; }
    .tag-btn { font-size: .78rem; cursor: pointer; border: 1px solid #555; background: transparent; color: #ccc; }
    .tag-btn:hover { border-color: var(--primary); color: var(--primary); }
    .vote-btn { font-size: .75rem; padding: 0.2rem 0.5rem; }
    .vote-up { background: #28a745; border-color: #28a745; }
    .vote-down { background: #dc3545; border-color: #dc3545; }
    .category-pill { cursor: pointer; }
    .category-pill:hover { opacity: 0.8; }
    label { color: #aaa; font-size: .85rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link text-white" href="/admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>🤼 Wrestling Coach Assistant</h1>
    <p class="lead mb-4" style="color:#aaa;">Folkstyle technique library with coach ratings</p>
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="input-group input-group-lg mb-3">
          <input type="text" class="form-control search-box" id="searchInput"
            placeholder="Search: single leg, half nelson, cradle...">
          <button class="btn btn-wrestling" onclick="search()">🔍 Search</button>
        </div>
      </div>
    </div>
    
    <!-- Category Pills -->
    <div class="d-flex flex-wrap justify-content-center gap-2 mb-3" id="categoryPills">
      <button class="btn badge-red category-pill" onclick="searchCategory('')">All</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('takedowns')">Takedowns</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('pins')">Pins</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('tilts')">Tilts</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('escapes')">Escapes</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('reversals')">Reversals</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('defense')">Defense</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('top_riding')">Riding</button>
    </div>
  </div>
</div>

<div class="container py-4">
  <!-- Filters -->
  <div class="row mb-4 g-2">
    <div class="col-6 col-md-3">
      <label>Position</label>
      <select class="form-select filter-select" id="fPos" onchange="search()">
        <option value="">All positions</option>
        <option>neutral</option>
        <option>top</option>
        <option>bottom</option>
      </select>
    </div>
    <div class="col-6 col-md-3">
      <label>Difficulty</label>
      <select class="form-select filter-select" id="fDiff" onchange="search()">
        <option value="">All levels</option>
        <option>beginner</option>
        <option>intermediate</option>
        <option>advanced</option>
      </select>
    </div>
    <div class="col-6 col-md-3">
      <label>Sort By</label>
      <select class="form-select filter-select" id="fSort" onchange="search()">
        <option value="rating">Rating (Top Rated)</option>
        <option value="newest">Newest First</option>
        <option value="alpha">Alphabetical</option>
      </select>
    </div>
    <div class="col-6 col-md-3 d-flex align-items-end">
      <button class="btn btn-outline-light w-100" onclick="showTopRated()">⭐ Top Rated</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="text-center py-5 text-muted">
      <p>Select a category above or search for a specific move</p>
    </div>
  </div>
</div>

<!-- Video Modal -->
<div class="modal fade" id="videoModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="ratio ratio-16x9">
          <iframe id="modalFrame" src="" allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
          </iframe>
        </div>
      </div>
      <div class="modal-footer" style="border-color:#333;">
        <div class="me-auto">
          <span id="modalRating" class="badge badge-votes"></span>
          <span id="modalVotes" class="text-muted small ms-2"></span>
        </div>
        <a id="modalLink" href="#" target="_blank" class="btn btn-sm btn-wrestling">Open on YouTube</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modal = new bootstrap.Modal(document.getElementById('videoModal'));
let currentVideoId = null;

document.getElementById('searchInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') search();
});

function searchCategory(cat) {
  document.getElementById('searchInput').value = '';
  search(cat);
}

function search(category = '') {
  const q = document.getElementById('searchInput').value;
  const pos = document.getElementById('fPos').value;
  const diff = document.getElementById('fDiff').value;
  
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (pos) params.set('position', pos);
  if (diff) params.set('difficulty', diff);
  if (category) params.set('category', category);
  
  document.getElementById('results').innerHTML = `
    <div class="text-center py-5">
      <div class="spinner-border" style="color:#e94560;"></div>
      <p class="mt-2 text-muted">Loading...</p>
    </div>`;
  
  fetch('/api/search?' + params)
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById('results').innerHTML =
        `<div class="alert alert-danger">Failed to load. Server running?</div>`;
    });
}

function showTopRated() {
  fetch('/api/stats')
    .then(r => r.json())
    .then(data => render(data.topRated))
    .catch(() => search());
}

function render(videos) {
  const div = document.getElementById('results');
  if (!videos.length) {
    div.innerHTML = `<div class="text-center py-5 text-muted">No videos found.</div>`;
    return;
  }
  
  div.innerHTML = `
    <p class="text-muted mb-3">${videos.length} video${videos.length !== 1 ? 's' : ''}</p>
    <div class="row g-3">
      ${videos.map(v => `
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100">
            <img src="${v.thumbnail_url}" class="video-thumb" style="cursor:pointer;"
              onclick="playVideo(${v.id}, '${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.channel || ''}', ${v.rating || 0}, ${v.upvotes || 0}, ${v.downvotes || 0})">
            <div class="card-body d-flex flex-column">
              <h6 class="card-title">${v.title}</h6>
              <p class="text-muted small mb-2">${v.duration_formatted || ''} · ${v.channel || ''}</p>
              <div class="mb-2">
                ${v.move_type ? `<span class="badge badge-red me-1">${v.move_type}</span>` : ''}
                ${v.position ? `<span class="badge bg-secondary me-1">${v.position}</span>` : ''}
                ${v.difficulty ? `<span class="badge bg-info text-dark me-1">${v.difficulty}</span>` : ''}
                ${v.rating > 0 ? `<span class="badge badge-votes">⭐ ${v.rating}</span>` : ''}
              </div>
              <div class="mt-auto d-flex justify-content-between align-items-center">
                <button class="btn btn-sm btn-wrestling" onclick="playVideo(${v.id}, '${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.channel || ''}', ${v.rating || 0}, ${v.upvotes || 0}, ${v.downvotes || 0})">
                  ▶ Watch
                </button>
                <div>
                  <button class="btn btn-sm vote-btn vote-up me-1" onclick="vote(${v.id}, 'up')">👍 ${v.upvotes || 0}</button>
                  <button class="btn btn-sm vote-btn vote-down" onclick="vote(${v.id}, 'down')">👎 ${v.downvotes || 0}</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function playVideo(id, youtubeId, title, channel, rating, up, down) {
  currentVideoId = id;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalFrame').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
  document.getElementById('modalLink').href = `https://www.youtube.com/watch?v=${youtubeId}`;
  document.getElementById('modalRating').textContent = rating > 0 ? `⭐ ${rating}` : 'No ratings';
  document.getElementById('modalVotes').textContent = `👍 ${up} 👎 ${down}`;
  modal.show();
}

function vote(videoId, type) {
  fetch(`/api/vote/${videoId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ vote: type })
  })
    .then(r => r.json())
    .then(() => search())
    .catch(console.error);
}

document.getElementById('videoModal').addEventListener('hide.bs.modal', () => {
  document.getElementById('modalFrame').src = '';
});

// Load on page load
search();
</script>
</body>
</html>
