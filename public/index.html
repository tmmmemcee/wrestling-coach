<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrestling Coach Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,.7) !important; transition: color .2s; }
    .nav-link:hover, .nav-link.active { color: var(--primary) !important; }
    .hero { background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%); padding: 2.5rem 0; text-align: center; }
    .hero h1 { color: var(--primary); font-size: 2.2rem; font-weight: bold; }
    .search-box { background: var(--darker); border: 2px solid var(--primary); color: white; }
    .search-box:focus { background: var(--darker); color: white; box-shadow: 0 0 0 0.2rem rgba(233,69,96,.25); border-color: var(--primary); }
    .search-box::placeholder { color: #aaa; }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; border-color: #c73652; color: white; }
    .filter-select { background: var(--darker); color: white; border: 1px solid #555; }
    .filter-select:focus { background: var(--darker); color: white; border-color: var(--primary); }
    .card { background: var(--card); border: none; transition: transform .2s; }
    .card:hover { transform: translateY(-4px); }
    .card-title { color: var(--primary); font-size: 0.95rem; }
    .video-thumb { width: 100%; height: 170px; object-fit: cover; background: #16213e; }
    .video-thumb:hover { opacity: 0.9; }
    .badge-red { background: var(--primary); color: white; }
    .badge-votes { background: #28a745; }
    .tag-btn { font-size: .78rem; cursor: pointer; border: 1px solid #555; background: transparent; color: #ccc; }
    .tag-btn:hover { border-color: var(--primary); color: var(--primary); }
    .vote-btn { font-size: .75rem; padding: 0.2rem 0.5rem; }
    .vote-up { background: #28a745; border-color: #28a745; }
    .vote-down { background: #dc3545; border-color: #dc3545; }
    .category-pill { cursor: pointer; }
    .category-pill:hover { opacity: 0.8; }
    label { color: #aaa; font-size: .85rem; }
    .thumbnail-fallback { background: linear-gradient(45deg, #16213e, #1a1a2e); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 3rem; }
    .btn-plan { background: #17a2b8; border-color: #17a2b8; color: white; font-size: .75rem; padding: 0.2rem 0.5rem; }
    .btn-plan:hover { background: #138496; border-color: #138496; color: white; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link active" href="/">Home</a>
      <a class="nav-link" href="/matches.html">Matches</a>
      <a class="nav-link" href="/lesson-plans.html">Lesson Plans</a>
      <a class="nav-link" href="/coaches.html">Coaches</a>
      <a class="nav-link" href="/admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>🤼 Wrestling Coach Assistant</h1>
    <p class="lead mb-4" style="color:#aaa;">Folkstyle technique library with coach ratings</p>
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="input-group input-group-lg mb-3">
          <input type="text" class="form-control search-box" id="searchInput"
            placeholder="Search: single leg, half nelson, cradle...">
          <button class="btn btn-wrestling" onclick="search()">🔍 Search</button>
        </div>
      </div>
    </div>
    
    <!-- Category Pills -->
    <div class="d-flex flex-wrap justify-content-center gap-2 mb-3" id="categoryPills">
      <button class="btn badge-red category-pill" onclick="searchCategory('')">All</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('takedowns')">Takedowns</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('pins')">Pins</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('tilts')">Tilts</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('escapes')">Escapes</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('reversals')">Reversals</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('defense')">Defense</button>
      <button class="btn btn-outline-light category-pill" onclick="searchCategory('top_riding')">Riding</button>
    </div>
  </div>
</div>

<div class="container py-4">
  <!-- Filters -->
  <div class="row mb-4 g-2">
    <div class="col-6 col-md-3">
      <label>Position</label>
      <select class="form-select filter-select" id="fPos" onchange="search()">
        <option value="">All positions</option>
        <option>neutral</option>
        <option>top</option>
        <option>bottom</option>
        <option>front_head</option>
      </select>
    </div>
    <div class="col-6 col-md-3">
      <label>Content Type</label>
      <select class="form-select filter-select" id="fContentType" onchange="search()">
        <option value="">All types</option>
        <option>technique</option>
        <option>drill</option>
        <option>match</option>
      </select>
    </div>
    <div class="col-md-3">
      <label>Difficulty</label>
      <select class="form-select filter-select" id="fDiff" onchange="search()">
        <option value="">All levels</option>
        <option>beginner</option>
        <option>intermediate</option>
        <option>advanced</option>
      </select>
    </div>
    <div class="col-6 col-md-3">
      <label>Sort By</label>
      <select class="form-select filter-select" id="fSort" onchange="search()">
        <option value="rating">Rating (Top Rated)</option>
        <option value="newest">Newest First</option>
        <option value="alpha">Alphabetical</option>
      </select>
    </div>
  </div>
  
  <div class="mb-4">
    <button class="btn btn-outline-light btn-sm" onclick="showTopRated()">⭐ Top Rated Videos</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="text-center py-5 text-muted">
      <p>Select a category above or search for a specific move</p>
    </div>
  </div>
</div>

<!-- Video Modal -->
<div class="modal fade" id="videoModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="ratio ratio-16x9">
          <iframe id="modalFrame" src="" allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
          </iframe>
        </div>
      </div>
      <div class="modal-footer" style="border-color:#333;">
        <div class="me-auto">
          <span id="modalRating" class="badge badge-votes"></span>
          <span id="modalVotes" class="text-muted small ms-2"></span>
          <span id="modalCoach" class="text-muted small ms-2"></span>
        </div>
        <button class="btn btn-sm btn-plan" onclick="openAddToPlanModal()">
          📋 Add to Plan
        </button>
        <a id="modalLink" href="#" target="_blank" class="btn btn-sm btn-wrestling">Watch on YouTube</a>
      </div>
    </div>
  </div>
</div>

<!-- Add to Plan Modal -->
<div class="modal fade" id="addToPlanModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white">📋 Add to Lesson Plan</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="addToPlanContent">
          <p class="text-muted mb-3">Adding: <strong id="addVideoTitle" style="color:var(--primary);"></strong></p>
          
          <div class="mb-3">
            <label class="form-label">Select Plan</label>
            <select class="form-select filter-select" id="planSelect">
              <option value="">-- Select a plan --</option>
            </select>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Notes for this video (optional)</label>
            <textarea class="form-control" id="videoNotes" rows="2" placeholder="e.g., Focus on hip positioning, drill 3x each side"></textarea>
          </div>
          
          <div class="d-flex gap-2 mb-3">
            <button class="btn btn-outline-light btn-sm" onclick="showNewPlanForm()">+ Create New Plan</button>
          </div>
          
          <div id="newPlanForm" class="d-none">
            <hr>
            <div class="mb-2">
              <label class="form-label">Plan Title *</label>
              <input type="text" class="form-control" id="newPlanTitle" placeholder="e.g., Week 1: Takedown Fundamentals">
            </div>
            <div class="row">
              <div class="col-6 mb-2">
                <label class="form-label">Difficulty</label>
                <select class="form-select filter-select" id="newPlanDifficulty">
                  <option>beginner</option>
                  <option>intermediate</option>
                  <option>advanced</option>
                </select>
              </div>
              <div class="col-6 mb-2">
                <label class="form-label">Category</label>
                <select class="form-select filter-select" id="newPlanCategory">
                  <option value="">All</option>
                  <option>takedowns</option>
                  <option>pins</option>
                  <option>tilts</option>
                  <option>escapes</option>
                  <option>reversals</option>
                  <option>defense</option>
                  <option>top_riding</option>
                </select>
              </div>
            </div>
            <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" id="newPlanTemplate">
              <label class="form-check-label small" for="newPlanTemplate">Save as template (reusable)</label>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="border-color:#333;">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-wrestling" onclick="addToPlan()">Add to Plan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modal = new bootstrap.Modal(document.getElementById('videoModal'));
const addToPlanModal = new bootstrap.Modal(document.getElementById('addToPlanModal'));
let currentVideoId = null;
let currentVideoTitle = '';
let currentVideoData = null;

document.getElementById('searchInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') search();
});

function searchCategory(cat) {
  document.getElementById('searchInput').value = '';
  search(cat);
}

function search(category = '') {
  const q = document.getElementById('searchInput').value;
  const pos = document.getElementById('fPos').value;
  const diff = document.getElementById('fDiff').value;
  const contentType = document.getElementById('fContentType').value;
  
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (pos) params.set('position', pos);
  if (diff) params.set('difficulty', diff);
  if (category) params.set('category', category);
  if (contentType) params.set('content_type', contentType);
  
  document.getElementById('results').innerHTML = `
    <div class="text-center py-5">
      <div class="spinner-border" style="color:#e94560;"></div>
      <p class="mt-2 text-muted">Loading...</p>
    </div>`;
  
  fetch('/api/search?' + params)
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById('results').innerHTML =
        `<div class="alert alert-danger">Failed to load. Server running?</div>`;
    });
}

function showTopRated() {
  fetch('/api/stats')
    .then(r => r.json())
    .then(data => render(data.topRated))
    .catch(() => search());
}

function render(videos) {
  const div = document.getElementById('results');
  if (!videos.length) {
    div.innerHTML = `<div class="text-center py-5 text-muted">No videos found.</div>`;
    return;
  }
  
  div.innerHTML = `
    <p class="text-muted mb-3">${videos.length} video${videos.length !== 1 ? 's' : ''}</p>
    <div class="row g-3">
      ${videos.map(v => {
        const coachDisplay = v.coach_name || (v.channel ? v.channel.split('YouTube')[0].trim() : '');
        return `
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100">
            <img src="${v.thumbnail_url}" class="video-thumb" 
              onerror="this.className='video-thumb thumbnail-fallback'; this.alt='${v.title}'; this.src='';"
              alt="${v.title}"
              style="cursor:pointer;"
              onclick="playVideo(${v.id}, '${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.channel || ''}', ${v.rating || 0}, ${v.upvotes || 0}, ${v.downvotes || 0}, '${coachDisplay}')">
            <div class="card-body d-flex flex-column">
              <h6 class="card-title">${v.title}</h6>
              <p class="text-muted small mb-2">${v.duration_formatted || ''} • ${coachDisplay || 'Unknown'}</p>
              <div class="mb-2">
                ${v.move_type ? `<span class="badge badge-red me-1">${v.move_type}</span>` : ''}
                ${v.position ? `<span class="badge bg-secondary me-1">${v.position}</span>` : ''}
                ${v.difficulty ? `<span class="badge bg-info text-dark me-1">${v.difficulty}</span>` : ''}
                ${v.rating > 0 ? `<span class="badge badge-votes">⭐ ${v.rating}</span>` : ''}
                ${v.content_type === 'match' ? `<span class="badge bg-danger me-1">🎬 Match</span>` : ''}
                ${v.content_type === 'drill' ? `<span class="badge bg-warning text-dark me-1">🏋️ Drill</span>` : ''}
              </div>
              <div class="mt-auto d-flex justify-content-between align-items-center flex-wrap gap-1">
                <button class="btn btn-sm btn-wrestling" onclick="playVideo(${v.id}, '${v.youtube_id}', '${v.title.replace(/'/g,"\\'")}', '${v.channel || ''}', ${v.rating || 0}, ${v.upvotes || 0}, ${v.downvotes || 0}, '${coachDisplay}')">
                  ▶ Watch
                </button>
                <button class="btn btn-sm btn-plan" onclick="openAddToPlanModalDirect(${v.id}, '${v.title.replace(/'/g,"\\'")}')">
                  📋 Add to Plan
                </button>
                <div>
                  <button class="btn btn-sm vote-btn vote-up" onclick="vote(${v.id}, 'up')">👍 ${v.upvotes || 0}</button>
                  <button class="btn btn-sm vote-btn vote-down" onclick="vote(${v.id}, 'down')">👎 ${v.downvotes || 0}</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        `;
      }).join('')}
    </div>`;
}

function playVideo(id, youtubeId, title, channel, rating, up, down, coach) {
  currentVideoId = id;
  currentVideoTitle = title;
  currentVideoData = { id, youtubeId, title, channel, rating, up, down, coach };
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalFrame').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
  document.getElementById('modalLink').href = `https://www.youtube.com/watch?v=${youtubeId}`;
  document.getElementById('modalRating').textContent = rating > 0 ? `⭐ ${rating}` : 'No ratings';
  document.getElementById('modalVotes').textContent = `👍 ${up} 👎 ${down}`;
  document.getElementById('modalCoach').textContent = coach ? `By: ${coach}` : '';
  modal.show();
}

function vote(videoId, type) {
  fetch(`/api/vote/${videoId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ vote: type })
  })
    .then(r => r.json())
    .then(() => search())
    .catch(console.error);
}

function openAddToPlanModal() {
  openAddToPlanModalDirect(currentVideoId, currentVideoTitle);
}

function openAddToPlanModalDirect(videoId, videoTitle) {
  currentVideoId = videoId;
  currentVideoTitle = videoTitle;
  document.getElementById('addVideoTitle').textContent = videoTitle;
  document.getElementById('videoNotes').value = '';
  document.getElementById('newPlanForm').classList.add('d-none');
  document.getElementById('planSelect').value = '';
  
  // Load existing plans
  fetch('/api/lesson-plans')
    .then(r => r.json())
    .then(plans => {
      const select = document.getElementById('planSelect');
      select.innerHTML = '<option value="">-- Select a plan --</option>';
      
      plans.filter(p => !p.is_template).forEach(plan => {
        const videoCount = plan.videos ? plan.videos.length : 0;
        const option = document.createElement('option');
        option.value = plan.id;
        option.textContent = `${plan.name} (${videoCount} videos)`;
        select.appendChild(option);
      });
      
      select.innerHTML += '<option value="new">+ Create new plan...</option>';
    })
    .catch(console.error);
  
  modal.hide();
  addToPlanModal.show();
}

function showNewPlanForm() {
  document.getElementById('newPlanForm').classList.toggle('d-none');
  document.getElementById('planSelect').value = '';
}

document.getElementById('planSelect').addEventListener('change', (e) => {
  if (e.target.value === 'new') {
    showNewPlanForm();
  }
});

async function addToPlan() {
  const planId = document.getElementById('planSelect').value;
  const notes = document.getElementById('videoNotes').value;
  const newPlanTitle = document.getElementById('newPlanTitle').value.trim();
  
  let targetPlanId = null;
  
  // If creating new plan
  if (newPlanTitle) {
    try {
      const res = await fetch('/api/lesson-plans', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: newPlanTitle,
          difficulty: document.getElementById('newPlanDifficulty').value,
          category: document.getElementById('newPlanCategory').value,
          is_template: document.getElementById('newPlanTemplate').checked,
          videos: [{ id: currentVideoId, notes: notes }]
        })
      });
      
      if (res.ok) {
        addToPlanModal.hide();
        alert(`✅ Created "${newPlanTitle}" and added video!`);
        return;
      } else {
        throw new Error('Failed to create plan');
      }
    } catch (e) {
      alert('Error creating plan: ' + e.message);
      return;
    }
  }
  
  // If adding to existing plan
  if (!planId) {
    alert('Please select a plan or create a new one');
    return;
  }
  
  try {
    const res = await fetch(`/api/plan-videos/${planId}/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videoId: currentVideoId, notes: notes })
    });
    
    if (res.ok) {
      addToPlanModal.hide();
      alert(`✅ Added to lesson plan!`);
    } else {
      throw new Error('Failed to add video');
    }
  } catch (e) {
    alert('Error adding video: ' + e.message);
  }
}

document.getElementById('videoModal').addEventListener('hide.bs.modal', () => {
  document.getElementById('modalFrame').src = '';
});

// Load on page load
search();
</script>
</body>
</html>
