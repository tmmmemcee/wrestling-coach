<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Plans - Wrestling Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,.7) !important; }
    .nav-link.active { color: var(--primary) !important; font-weight: bold; }
    .hero { background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%); padding: 2.5rem 0; text-align: center; }
    .hero h1 { color: var(--primary); font-size: 2.2rem; font-weight: bold; }
    .card { background: var(--card); border: none; }
    .card-header { color: var(--primary); border-color: #333; }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; border-color: #c73652; color: white; }
    .plan-card { cursor: pointer; transition: transform .2s; }
    .plan-card:hover { transform: translateY(-4px); }
    .video-item { border-left: 3px solid var(--primary); }
    .drag-handle { cursor: grab; opacity: 0.7; }
    .drag-handle:hover { opacity: 1; }
    label { color: #aaa; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/matches.html">Matches</a>
      <a class="nav-link" href="/coaches.html">Coaches</a>
      <a class="nav-link active" href="/lesson-plans.html">Lesson Plans</a>
      <a class="nav-link" href="/admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>📝 Lesson Plans</h1>
    <p class="lead mb-4" style="color:#aaa;">Create practice plans with curated videos</p>
    <div class="d-flex justify-content-center gap-2 mb-3">
      <button class="btn btn-outline-light" onclick="showAllPlans()">All Plans</button>
      <button class="btn btn-outline-light" onclick="showTemplates()">Templates (Re-usable)</button>
    </div>
    <button class="btn btn-wrestling btn-lg" onclick="showCreateModal()">+ Create New Plan</button>
  </div>
</div>

<div class="container py-4">
  <h3 class="mb-4" style="color: var(--primary);">Your Lesson Plans</h3>
  
  <div id="plansList" class="row g-4">
    <div class="col-12 text-center py-5">
      <div class="spinner-border" style="color: var(--primary);" role="status"></div>
    </div>
  </div>
</div>

<!-- Create/Edit Plan Modal -->
<div class="modal fade" id="planModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white" id="planModalTitle">Create New Plan</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="planForm">
          <div class="mb-3">
            <label class="form-label">Plan Name *</label>
            <input type="text" class="form-control" id="planName" required placeholder="e.g., Week 1: Takedown Fundamentals">
          </div>
          
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="planDescription" rows="2" placeholder="Brief description of the plan goal"></textarea>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Difficulty</label>
              <select class="form-select" id="planDifficulty">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" id="planCategory">
                <option value="">All Categories</option>
                <option value="takedowns">Takedowns</option>
                <option value="pins">Pins</option>
                <option value="escapes">Escapes</option>
                <option value="reversals">Reversals</option>
                <option value="defense">Defense</option>
                <option value="fundamentals">Fundamentals</option>
                <option value="top_riding">Top Riding</option>
              </select>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Practice Notes</label>
            <textarea class="form-control" id="planNotes" rows="3" placeholder="Notes for coaches (drills, timing, etc.)"></textarea>
          </div>
          
          <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="isTemplate">
            <label class="form-check-label" for="isTemplate">Save as Template (Copy for future plans)</label>
          </div>
          
          <hr>
          <h6 class="text-muted">Add Videos to Plan</h6>
          
          <div id="videoSearch" class="mb-3">
            <input type="text" class="form-control" id="videoSearchInput" placeholder="Search videos...">
          </div>
          
          <div id="searchResults" class="d-none">
            <div class="alert alert-info">
              Click a video to add it to your plan. Add videos in the order you want them to play.
            </div>
          </div>
          
          <div id="selectedVideos" class="d-none">
            <p class="text-muted small mb-2">Selected Videos (Drag to reorder):</p>
            <div id="videoList" class="d-flex flex-column gap-2"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer" style="border-color:#333;">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-wrestling" onclick="savePlan()">Save Plan</button>
      </div>
    </div>
  </div>
</div>

<!-- View Plan Modal -->
<div class="modal fade" id="viewPlanModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background:#0f3460;">
      <div class="modal-header" style="border-color:#e94560;">
        <h5 class="modal-title text-white" id="viewPlanTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="viewPlanContent"></div>
      </div>
      <div class="modal-footer" style="border-color:#333;">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-outline-light me-auto" onclick="duplicatePlan()">📋 Duplicate Plan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const planModal = new bootstrap.Modal(document.getElementById('planModal'));
const viewPlanModal = new bootstrap.Modal(document.getElementById('viewPlanModal'));
let currentPlanId = null;
let selectedVideos = [];

// Show all or template plans
document.getElementById('showAllPlans').addEventListener('click', () => loadPlans(false));
document.getElementById('showTemplates').addEventListener('click', () => loadPlans(true));

async function loadPlans(isTemplateOnly = false) {
  const res = await fetch(`/api/lesson-plans?is_template=${isTemplateOnly}`);
  const plans = await res.json();
  
  const div = document.getElementById('plansList');
  
  if (!plans.length) {
    div.innerHTML = `
      <div class="col-12 text-center py-5">
        <p class="text-muted mb-3">No lesson plans yet.</p>
        <button class="btn btn-wrestling" onclick="showCreateModal()">+ Create Your First Plan</button>
      </div>`;
    return;
  }
  
  div.innerHTML = plans.map(plan => `
    <div class="col-12">
      <div class="card p-3 plan-card" onclick="viewPlan(${plan.id})">
        <div class="row align-items-center">
          <div class="col-md-8">
            <h5 class="mb-1" style="color: var(--primary);">${plan.name}</h5>
            ${plan.description ? `<p class="text-muted small mb-1">${plan.description}</p>` : ''}
            <div class="badge badge-red me-1">${plan.difficulty || 'Beginner'}</div>
            ${plan.category ? `<span class="badge bg-secondary me-1">${plan.category}</span>` : ''}
            <span class="text-muted small">${plan.videos.length} videos</span>
            ${plan.is_template ? `<span class="badge bg-warning text-dark ms-2">Template</span>` : ''}
          </div>
          <div class="col-md-4 text-end">
            <small class="text-muted">${new Date(plan.created_at).toLocaleDateString()}</small><br>
            <button class="btn btn-sm btn-outline-light" onclick="event.stopPropagation(); viewPlan(${plan.id})">View Plan</button>
            ${!plan.is_template ? `<button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); deletePlan(${plan.id})">Delete</button>` : ''}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function showCreateModal() {
  document.getElementById('planModalTitle').textContent = 'Create New Plan';
  document.getElementById('planForm').reset();
  document.getElementById('isTemplate').checked = false;
  selectedVideos = [];
  updateSelectedVideos();
  planModal.show();
}

function viewPlan(planId) {
  currentPlanId = planId;
  fetch(`/api/lesson-plans/${planId}`)
    .then(r => r.json())
    .then(plan => {
      document.getElementById('viewPlanTitle').textContent = plan.name;
      const content = document.getElementById('viewPlanContent');
      
      content.innerHTML = `
        ${plan.description ? `<p class="mb-3">${plan.description}</p>` : ''}
        <p class="text-muted mb-3">
          <span class="badge badge-red me-1">${plan.difficulty || 'Beginner'}</span>
          ${plan.category ? `<span class="badge bg-secondary me-1">${plan.category}</span>` : ''}
          <span class="text-muted">${plan.videos.length} videos</span>
        </p>
        ${plan.notes ? `<p class="mb-3"><strong>Notes:</strong> ${plan.notes}</p>` : ''}
        <h6 class="mb-3">Videos in Order:</h6>
        <div class="d-flex flex-column gap-3">
          ${plan.videos.map((v, i) => `
            <div class="d-flex align-items-center p-3" style="background: var(--darker); border-radius: 8px;">
              <span class="badge badge-red me-3" style="width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;">${i + 1}</span>
              <img src="${v.thumbnail_url}" width="120" height="68" style="object-fit: cover; border-radius: 4px;" onerror="this.style.display='none'">
              <div class="ms-3 flex-grow-1">
                <h6 class="mb-1">${v.title}</h6>
                <small class="text-muted">${v.duration_formatted || ''} • ${v.coach_name || v.channel || 'Unknown'}</small>
              </div>
              <a href="https://www.youtube.com/watch?v=${v.youtube_id}" target="_blank" class="btn btn-sm btn-wrestling">Watch</a>
            </div>
          `).join('')}
        </div>
        ${plan.is_template ? '<p class="mt-3 text-success"><strong>✓ This is a template plan</strong><br>You can duplicate it to create new plans.</p>' : ''}
      `;
      
      viewPlanModal.show();
    });
}

function deletePlan(planId) {
  if (!confirm('Are you sure you want to delete this plan?')) return;
  
  fetch(`/api/lesson-plans/${planId}`, { method: 'DELETE' })
    .then(() => loadPlans(document.getElementById('showTemplates').classList.contains('active')));
}

async function duplicatePlan() {
  const res = await fetch(`/api/lesson-plans/${currentPlanId}`);
  const plan = await res.json();
  
  planModal.hide();
  showCreateModal();
  
  document.getElementById('planName').value = `${plan.name} (Copy)`;
  document.getElementById('planDescription').value = plan.description;
  document.getElementById('planDifficulty').value = plan.difficulty;
  document.getElementById('planCategory').value = plan.category;
  document.getElementById('planNotes').value = plan.notes;
  document.getElementById('isTemplate').checked = true;
  
  selectedVideos = plan.videos.map(v => ({ id: v.video_id, notes: v.notes }));
  updateSelectedVideos();
}

// Video search and selection
let searchTimeout;
document.getElementById('videoSearchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    const q = e.target.value.trim();
    if (!q) {
      document.getElementById('searchResults').classList.add('d-none');
      return;
    }
    
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const videos = await res.json();
    
    document.getElementById('searchResults').classList.remove('d-none');
    const div = document.getElementById('videoListSearch');
    
    if (!videos.length) {
      div.innerHTML = '<p class="text-muted">No videos found</p>';
      return;
    }
    
    div.innerHTML = videos.map(v => `
      <div class="card p-2 mb-2" style="cursor: pointer;" onclick="addVideo(${v.id}, '${v.title.replace(/'/g,"\\'")}', '${v.thumbnail_url.replace(/'/g,"\\'")}')">
        <div class="d-flex">
          <img src="${v.thumbnail_url}" width="80" height="45" style="object-fit: cover; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
          <div class="flex-grow-1">
            <h6 class="mb-1 small">${v.title}</h6>
            ${v.move_type || v.category ? `<span class="badge badge-red me-1">${v.move_type || v.category}</span>` : ''}
            <small class="text-muted">${v.duration_formatted || ''}</small>
          </div>
        </div>
      </div>
    `).join('');
  }, 300);
});

// Add search results div
const searchInput = document.getElementById('videoSearchInput');
searchInput.insertAdjacentHTML('afterend', '<div id="videoListSearch" class="mt-2"></div>');

async function addVideo(id, title, thumbnail) {
  if (selectedVideos.find(v => v.id === id)) {
    alert('Video already added!');
    return;
  }
  
  selectedVideos.push({ id, title, thumbnail });
  updateSelectedVideos();
  
  // Refresh search to show added videos
  const currentSearch = document.getElementById('videoSearchInput').value;
  if (currentSearch.trim()) {
    searchTimeout = setTimeout(() => {}, 0);
  }
}

async function removeVideo(index) {
  selectedVideos.splice(index, 1);
  updateSelectedVideos();
}

function updateSelectedVideos() {
  const div = document.getElementById('selectedVideos');
  const list = document.getElementById('videoList');
  
  if (!selectedVideos.length) {
    div.classList.add('d-none');
    return;
  }
  
  div.classList.remove('d-none');
  
  list.innerHTML = selectedVideos.map((v, i) => `
    <div class="d-flex align-items-center justify-content-between p-2" style="background: var(--darker); border-radius: 4px;">
      <div class="d-flex align-items-center">
        <span class="badge badge-red me-2" style="width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;">${i + 1}</span>
        <span>${v.title}</span>
      </div>
      <button class="btn btn-sm btn-outline-danger" onclick="removeVideo(${i})">Remove</button>
    </div>
  `).join('');
}

async function savePlan() {
  const name = document.getElementById('planName').value.trim();
  if (!name) {
    alert('Please enter a plan name');
    return;
  }
  
  if (!selectedVideos.length) {
    alert('Please add at least one video');
    return;
  }
  
  const data = {
    name: name,
    description: document.getElementById('planDescription').value,
    difficulty: document.getElementById('planDifficulty').value,
    category: document.getElementById('planCategory').value,
    notes: document.getElementById('planNotes').value,
    videos: selectedVideos,
    is_template: document.getElementById('isTemplate').checked
  };
  
  try {
    const res = await fetch('/api/lesson-plans', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    if (res.ok) {
      planModal.hide();
      loadPlans(false);
    } else {
      throw new Error('Failed to save plan');
    }
  } catch (e) {
    alert('Error saving plan: ' + e.message);
  }
}

// Initialize
loadPlans(false);
</script>
</body>
</html>
