<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Wrestling Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --dark: #1a1a2e;
      --darker: #16213e;
      --card: #0f3460;
    }
    body { background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--darker); border-bottom: 3px solid var(--primary); }
    .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.4rem; }
    .admin-container { max-width: 800px; margin: 2rem auto; }
    .card { background: var(--card); border: none; }
    .card-header { color: var(--primary); border-color: #333; }
    .form-label { color: #aaa; }
    .form-control, .form-select { background: var(--darker); border: 1px solid #555; color: white; }
    .form-control:focus, .form-select:focus { background: var(--darker); color: white; border-color: var(--primary); }
    .btn-wrestling { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-wrestling:hover { background: #c73652; border-color: #c73652; color: white; }
    h2 { color: var(--primary); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">🤼 Wrestling Coach</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link text-white" href="/admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="container admin-container">
  <h2 class="mt-4">📝 Add New Custom Move</h2>
  <div class="card mt-3">
    <div class="card-header">Add a Custom Wrestling Move to the Library</div>
    <div class="card-body">
      <form id="addMoveForm">
        <div class="mb-3">
          <label class="form-label">Move Name *</label>
          <input type="text" class="form-control" id="moveName" required placeholder="e.g., Cow Catcher, Stack, Headlock, Front Head Position">
        </div>
        
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Category *</label>
            <select class="form-select" id="category" required>
              <option value="">Select...</option>
              <option value="pins">Pins</option>
              <option value="tilts">Tilts</option>
              <option value="takedowns">Takedowns</option>
              <option value="escapes">Escapes</option>
              <option value="reversals">Reversals</option>
              <option value="defense">Defense</option>
              <option value="top_riding">Top Riding</option>
              <option value="fundamentals">Fundamentals</option>
            </select>
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label">Position *</label>
            <select class="form-select" id="position" required>
              <option value="">Select...</option>
              <option value="neutral">Neutral</option>
              <option value="top">Top (Offense)</option>
              <option value="bottom">Bottom (Defense)</option>
              <option value="front_head">Front Head (Head Control)</option>
            </select>
          </div>
        </div>
        
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Difficulty *</label>
            <select class="form-select" id="difficulty" required>
              <option value="">Select...</option>
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label">Style</label>
            <select class="form-select" id="style">
              <option value="folkstyle">Folkstyle</option>
              <option value="freestyle">Freestyle</option>
              <option value="greco">Greco-Roman</option>
              <option value="all">All Styles</option>
            </select>
          </div>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Search Keywords (comma-separated) *</label>
          <input type="text" class="form-control" id="keywords" required placeholder="e.g., cow catcher, cowcatcher, crotch catch, front head, head control">
          <div class="form-text text-muted">Used to find this move when searching</div>
        </div>
        
        <button type="submit" class="btn btn-wrestling w-100">Add Move to Library</button>
      </form>
      
      <div id="successMessage" class="alert alert-success mt-3" style="display: none;">
        ✅ Move added successfully!<br>
        <small>Go back home to see the new move.</small>
      </div>
    </div>
  </div>
  
  <div class="card mt-4">
    <div class="card-header">Library Statistics</div>
    <div class="card-body">
      <div class="row text-center">
        <div class="col-4">
          <h4 id="totalMoves">0</h4>
          <p class="text-muted">Total Videos</p>
        </div>
        <div class="col-4">
          <h4 id="totalCategories">0</h4>
          <p class="text-muted">Categories</p>
        </div>
        <div class="col-4">
          <h4 id="totalCoaches">0</h4>
          <p class="text-muted">Coaches</p>
        </div>
      </div>
    </div>
  </div>
  
  <div class="mt-4 text-center">
    <a href="/" class="btn btn-outline-light">← Back to Home</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const statsRes = await fetch('/api/stats');
    const stats = await statsRes.json();
    document.getElementById('totalMoves').textContent = stats.total;
    document.getElementById('totalCoaches').textContent = stats.topCoaches?.length || 0;
    
    const categoriesRes = await fetch('/api/categories');
    const categories = await categoriesRes.json();
    document.getElementById('totalCategories').textContent = categories.length;
  } catch (e) {
    console.error('Error loading stats:', e);
  }
});

document.getElementById('addMoveForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const moveData = {
    name: document.getElementById('moveName').value.trim(),
    category: document.getElementById('category').value,
    position: document.getElementById('position').value,
    difficulty: document.getElementById('difficulty').value,
    style: document.getElementById('style').value || 'folkstyle',
    keywords: document.getElementById('keywords').value.split(',').map(k => k.trim().toLowerCase()).filter(Boolean)
  };
  
  if (!moveData.name || !moveData.category || !moveData.position || !moveData.difficulty || moveData.keywords.length === 0) {
    alert('Please fill in all required fields!');
    return;
  }
  
  try {
    const response = await fetch('/api/moves', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(moveData)
    });
    
    if (!response.ok) {
      throw new Error('Failed to add move');
    }
    
    document.getElementById('successMessage').style.display = 'block';
    document.getElementById('addMoveForm').reset();
    
    // Reload stats
    const statsRes = await fetch('/api/stats');
    const stats = await statsRes.json();
    document.getElementById('totalMoves').textContent = stats.total;
  } catch (error) {
    alert('Error adding move: ' + error.message);
  }
});
</script>
</body>
</html>
